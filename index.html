<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>거탐 알리미</title>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; padding: 50px; background-color: #2c3e50; color: white; }
        .container { max-width: 600px; margin: 0 auto; background: #34495e; padding: 30px; border-radius: 15px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; margin: 10px; }
        #startBtn { background-color: #3498db; color: white; }
        #stopBtn { background-color: #e74c3c; color: white; }
        .hidden { display: none !important; }
        .upload-box { margin: 20px 0; padding: 20px; border: 2px dashed #f1c40f; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚨 거탐 알리미</h1>
        
        <div class="upload-box">
            <p style="margin-top: 0;"><strong>📂 바탕화면의 target.png 파일을 선택하세요</strong></p>
            <input type="file" id="imageUpload" accept="image/*">
            <p id="uploadStatus" style="color: #f1c40f; margin-bottom: 0;">(이미지를 넣어야 시작 버튼이 켜집니다)</p>
        </div>

        <button id="startBtn" disabled>로딩 중...</button>
        <button id="stopBtn" class="hidden">감시 중지</button>
        <div id="status">대기 중...</div>

        <video id="video" autoplay class="hidden"></video>
        <canvas id="canvas" class="hidden"></canvas>
        <img id="targetImage" class="hidden">
        
        <audio id="alarmSound" src="alarm.mp3" preload="auto"></audio>
    </div>
    <script src="script.js"></script>
</body>
</html>
